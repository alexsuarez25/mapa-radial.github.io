/* Smart search: text → matching tags + nodes */
function smartSearch(query){
  try{
  if(!query||typeof query!=='string'||query.length<2)return{tags:[],nodes:[]};
  const q=query.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const matchedTagIdx=new Set();
  /* 1. Direct keyword matching */
  for(const[kw,indices] of Object.entries(KEYWORDS)){
    if(q.includes(kw)||kw.includes(q)){indices.forEach(i=>matchedTagIdx.add(i));}
  }
  /* 2. Match against tag names */
  TAGS.forEach((tag,i)=>{
    const tn=tag.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    if(tn.includes(q)||q.includes(tn.split(" ")[0]))matchedTagIdx.add(i);
  });
  /* 3. Find nodes by name match OR by matched tags */
  const matchedNodes=[];const seen=new Set();
  /* Direct name matches first — prioritize projects */
  PROJECTS.forEach(p=>{
    const sn=p.short.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    const fn=(p.desc?.title||"").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    if(sn.includes(q)||fn.includes(q)||q.split(" ").some(w=>w.length>2&&(sn.includes(w)||fn.includes(w)))){
      if(!seen.has(p.short)){seen.add(p.short);
        matchedNodes.push({name:p.short,type:"Proyecto",parent:"Proyectos",branch:"proyectos",projKey:p.key,matchType:"direct"});}
    }
  });
  /* Then other nodes */
  NODE_INDEX.forEach(n=>{
    const nn=n.name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
    if(nn.includes(q)||q.split(" ").some(w=>w.length>2&&nn.includes(w))){
      if(!seen.has(n.name)){seen.add(n.name);matchedNodes.push({...n,matchType:"direct"});}
    }
  });
  /* Tag-based matches */
  if(matchedTagIdx.size>0){
    Object.entries(TAG_MAP).forEach(([name,indices])=>{
      if(seen.has(name))return;
      if(indices.some(i=>matchedTagIdx.has(i))){
        const entry=findInIndex(name);
        if(entry.length>0){seen.add(name);matchedNodes.push({...entry[0],matchType:"tag"});}
      }
    });
  }
  const matchedTags=[...matchedTagIdx].map(i=>TAGS[i]);
  return{tags:matchedTags||[],nodes:(matchedNodes||[]).slice(0,30)};
  }catch(e){console.error('smartSearch error:',e);return{tags:[],nodes:[]};}
}

/* ═══ GEOMETRÍA ═══ */
const WW=12000,HH=9000,CX=WW/2,CY=HH/2;
const R1=850,R2=600,R3=500,RP=520;
const NR0=140,NR1=170,NR2=75,NR3=26;
const toRad=d=>d*Math.PI/180;
const pol=(cx,cy,r,deg)=>[cx+r*Math.cos(toRad(deg)),cy+r*Math.sin(toRad(deg))];
function fan(n,c,ms,mx){if(n<=0)return[];if(n===1)return[c];
  const sp=Math.min(Math.max((n-1)*ms,ms*2),mx),st=sp/(n-1);
  return Array.from({length:n},(_,i)=>c-sp/2+st*i);}

const mPos={};MAIN.forEach(m=>{const[x,y]=pol(CX,CY,R1,m.angle);mPos[m.key]={x,y};});

function subPos(mk,subs){const o=mPos[mk];const m=MAIN.find(n=>n.key===mk);
  const n=subs.length;const a=fan(n,m.angle,34,190);
  return subs.map((s,i)=>{const[x,y]=pol(o.x,o.y,R2,a[i]);return{...s,x,y,angle:a[i]};});}

function itemPos(sub,items){
  const outA=Math.atan2(sub.y-CY,sub.x-CX)*180/Math.PI;
  const n=items.length;
  const dynR=Math.max(R3,R3+Math.max(0,n-5)*25);
  const ms=n>12?18:(n>8?22:(n>5?26:30));
  const mx=Math.min(300,Math.max(n*ms*1.2,ms*3));
  const a=fan(n,outA,ms,mx);
  return items.map((it,i)=>{const nm=typeof it==="string"?it:it.name;
    const[x,y]=pol(sub.x,sub.y,dynR,a[i]);
    return{name:nm,x,y,contact:gc(nm)};});}

function projPos(){const o=mPos.proyectos;const n=PROJECTS.length;const a=fan(n,MAIN[0].angle,26,150);
  return PROJECTS.map((p,i)=>{const[x,y]=pol(o.x,o.y,R2,a[i]);return{...p,x,y,angle:a[i]};});}

function temaPos(proj){const pp=projPos().find(p=>p.key===proj.key);if(!pp)return[];
  const outA=Math.atan2(pp.y-CY,pp.x-CX)*180/Math.PI;
  const n=proj.tematicas.length;const a=fan(n,outA,34,180);
  return proj.tematicas.map((t,i)=>{const nm=typeof t==="string"?t:t.name;
    const[x,y]=pol(pp.x,pp.y,RP,a[i]);return{name:nm,x,y,angle:a[i]};});}

        x:sp?itemPos(sp,[it])[0]?.x:0,y:sp?itemPos(sp,[it])[0]?.y:0});
    });
  });
  /* Investigación */
  INVEST_SUBS.forEach(sub=>{
    const sp=subPos("investigacion",INVEST_SUBS).find(s=>s.key===sub.key);
    (sub.items||[]).forEach(it=>{
      const nm=typeof it==="string"?it:it.name;

        x:sp?itemPos(sp,[it])[0]?.x:0,y:sp?itemPos(sp,[it])[0]?.y:0});
    });
  });
  return idx;
}

function useCamera(init){const[vb,setVb]=useState(init);const cur=useRef(init);const an=useRef(null);
  const ease=t=>t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;
  const flyTo=useCallback((tgt,dur=850)=>{if(an.current)cancelAnimationFrame(an.current);
    const fr=[...cur.current],st=performance.now();
    const tk=now=>{const t=Math.min((now-st)/dur,1),e=ease(t),
      nx=fr.map((v,i)=>v+(tgt[i]-v)*e);cur.current=nx;setVb(nx);
      if(t<1)an.current=requestAnimationFrame(tk);};an.current=requestAnimationFrame(tk);},[]);
  const zoomAt=useCallback((cx,cy,el,f)=>{if(an.current)cancelAnimationFrame(an.current);
    const r=el.getBoundingClientRect(),[vx,vy,vw,vh]=cur.current;
    const mx=vx+(cx-r.left)/r.width*vw,my=vy+(cy-r.top)/r.height*vh;
    const nw=Math.max(800,Math.min(WW*0.8,vw*f)),nh=nw*vh/vw;
    cur.current=[mx-(mx-vx)*nw/vw,my-(my-vy)*nh/vh,nw,nh];setVb([...cur.current]);},[]);
  const panBy=useCallback((dx,dy,el)=>{if(an.current)cancelAnimationFrame(an.current);
    const r=el.getBoundingClientRect(),[vx,vy,vw,vh]=cur.current;
    cur.current=[vx-dx*vw/r.width,vy-dy*vh/r.height,vw,vh];setVb([...cur.current]);},[]);
  return{vb,flyTo,zoomAt,panBy};}

const CAM_HOME=[CX-1600,CY-1230,3200,2460];
function camBB(nodes,pad=300){let x1=1e9,x2=-1e9,y1=1e9,y2=-1e9;
  nodes.forEach(n=>{x1=Math.min(x1,n.x-120);x2=Math.max(x2,n.x+120);y1=Math.min(y1,n.y-100);y2=Math.max(y2,n.y+100);});
  let w=x2-x1+pad*2,h=y2-y1+pad*2;const ar=1.3;if(w/h>ar)h=w/ar;else w=h*ar;
  w=Math.max(w,900);w=Math.min(w,2400);return[(x1-pad)+(x2-x1+pad*2-w)/2,(y1-pad)+(y2-y1+pad*2-h)/2,w,h];}
function camN(x,y){return[x-350,y-270,700,540];}

function MT({text,x,y,size=12,fill="#333",bold=true,lh=null}){
  const ls=text.split("\n"),lH=lh||size*1.35,y0=y-(ls.length-1)*lH/2;
  return ls.map((l,i)=>(<text key={i} x={x} y={y0+i*lH} textAnchor="middle" dominantBaseline="middle"
    fontSize={size} fill={fill} fontWeight={bold?900:700}
    fontFamily="'Cormorant Garamond','Georgia',serif"
    style={{pointerEvents:"none",letterSpacing:"0.4px"}}>{l}</text>));}

function RichEditor({value,onChange,placeholder}){
  const ref=useRef(null);
  const exec=cmd=>{document.execCommand(cmd,false,null);ref.current?.focus();};
  useEffect(()=>{if(ref.current&&!ref.current.innerHTML&&value)ref.current.innerHTML=value;},[]);
  return(<div>
    <div style={{display:"flex",gap:2,marginBottom:6,borderBottom:`1px solid ${C.gold}20`,paddingBottom:6}}>
      <button onClick={()=>exec('bold')} style={{width:28,height:26,border:`1px solid ${C.gold}30`,borderRadius:5,background:C.white,cursor:"pointer",fontWeight:900,fontSize:13,color:C.textDk}} title="Negritas">B</button>
      <button onClick={()=>exec('italic')} style={{width:28,height:26,border:`1px solid ${C.gold}30`,borderRadius:5,background:C.white,cursor:"pointer",fontStyle:"italic",fontSize:13,color:C.textDk}} title="Itálicas">I</button>
      <button onClick={()=>exec('underline')} style={{width:28,height:26,border:`1px solid ${C.gold}30`,borderRadius:5,background:C.white,cursor:"pointer",textDecoration:"underline",fontSize:13,color:C.textDk}} title="Subrayado">U</button>
    </div>
    <div ref={ref} contentEditable suppressContentEditableWarning
      onInput={e=>onChange(e.currentTarget.innerHTML)}
      data-placeholder={placeholder||""}
      style={{minHeight:70,padding:"10px 12px",fontSize:13,border:`1px solid ${C.gold}30`,
        borderRadius:8,outline:"none",color:C.textDk,background:C.gold+"06",
        lineHeight:1.6,fontFamily:"'Source Sans 3',sans-serif",
        overflowY:"auto",maxHeight:140}}/>
  </div>);}

            if(resultNodes.length===0&&(!relatedTags||relatedTags.length===0))return null;

                if(proj){const d1=(!sM||sM.key!=="proyectos")?500:0;setTimeout(()=>goProj(proj),d1);}
              }

              <div style={{width:420,maxHeight:420,background:C.white,border:`1px solid ${C.gold}25`,
                borderRadius:14,boxShadow:"0 6px 30px rgba(0,0,0,0.1)",overflowY:"auto",display:"flex",flexDirection:"column"}}>
                {/* Related tags header */}
                {relatedTags.length>0&&(
                  <div style={{padding:"12px 18px",borderBottom:`1px solid ${C.gold}15`,flexShrink:0,
                    position:"sticky",top:0,background:C.white,zIndex:1}}>
                    <div style={{fontSize:10,fontWeight:800,color:C.gold,textTransform:"uppercase",
                      letterSpacing:"1px",marginBottom:6}}>
                      {searchText?"¿De qué puedes hablar?":"Temática"} · {resultNodes.length} resultados</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
                      {relatedTags.slice(0,6).map((t,i)=>(
                        <span key={i} style={{fontSize:9,fontWeight:700,color:C.gold,background:C.gold+"12",
                          border:`1px solid ${C.gold}20`,borderRadius:10,padding:"2px 8px"}}>
                          {t}</span>))}
                    </div>
                  </div>
                )}
                {/* Node results */}
                <div style={{flex:1,overflowY:"auto"}}>
                  {resultNodes.map((n,i)=>{
                    const tc=typeColors[n.type]||C.textLt;const ct=gc(n.name);
                    return(
                      <div key={i} onClick={e=>{e.stopPropagation();doZoom(n,n.name);}}
                        style={{padding:"10px 18px",cursor:"pointer",borderBottom:`1px solid ${C.gold}06`,
                          display:"flex",alignItems:"center",gap:8}}
                        onMouseEnter={e=>e.currentTarget.style.background=C.gold+"10"}
                        onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                        <span style={{fontSize:8,fontWeight:800,color:tc,background:tc+"14",
                          border:`1px solid ${tc}30`,borderRadius:5,padding:"2px 7px",
                          textTransform:"uppercase",letterSpacing:"0.3px",flexShrink:0,
                          whiteSpace:"nowrap"}}>{n.type}</span>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:700,color:C.textDk,overflow:"hidden",
                            textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{n.name}</div>
                          <div style={{fontSize:10,color:C.textLt,marginTop:1}}>
                            {n.parent||""}{n.matchType==="direct"?" · coincidencia directa":""}</div>
                        </div>
                        {(()=>{try{const hc=hasContact(n.name);return hc
                          ?<span style={{width:8,height:8,borderRadius:"50%",background:C.green,flexShrink:0}} title="Con contacto"/>
                          :<span style={{width:8,height:8,borderRadius:"50%",background:C.pulseRed,flexShrink:0}} title="Sin contacto"/>;}catch(e){return null;}})()}
                        <span style={{fontSize:16,color:C.gold,flexShrink:0}}>›</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          }catch(e){console.error("Search error:",e);return null;}})()}
          {/* VOLVER */}
          {(sM||cPanel)&&(
            <button onClick={e=>{e.stopPropagation();cPanel?setCPanel(false):goBack();}}
              style={{background:C.white,border:`1.5px solid ${C.gold}50`,borderRadius:10,
                padding:"10px 24px",cursor:"pointer",boxShadow:"0 2px 12px rgba(0,0,0,0.06)",
                display:"flex",alignItems:"center",gap:8}}>
              <span style={{fontSize:20,color:C.gold}}>←</span>
              <span style={{fontSize:18,fontWeight:900,color:C.textDk}}>Volver</span>
            </button>
          )}
        </div>

        <div ref={svgR} style={{position:"absolute",inset:0,cursor:dr.current.a?"grabbing":"grab"}}
          onClick={e=>{if(!dr.current.m)cBg();}} onMouseDown={onD} onMouseMove={onM2} onMouseUp={onU} onMouseLeave={onU}>
          <svg viewBox={vS} preserveAspectRatio="xMidYMid meet"
            style={{width:"100%",height:"100%",display:"block",userSelect:"none",imageRendering:"optimizeQuality"}}
            textRendering="optimizeLegibility" shapeRendering="geometricPrecision">
            <defs><radialGradient id="bgR" cx="50%" cy="50%" r="55%"><stop offset="0%" stopColor="#F5F2EB"/><stop offset="100%" stopColor="#EBE6DA"/></radialGradient></defs>
            <rect x="0" y="0" width={WW} height={HH} fill="url(#bgR)"/>
            <circle cx={CX} cy={CY} r={R1} fill="none" stroke={C.gold+"25"} strokeWidth="3" strokeDasharray="12,20"/>
            <text x={CX} y={CY-220} textAnchor="middle" fontSize={42} fontWeight={700} fill={C.goldDk} fontFamily="'Cormorant Garamond',serif" letterSpacing="2" style={{pointerEvents:"none"}}>Diálogos con el Entorno</text>

            {/* LINES center→main */}
            {MAIN.map(m=>{const o=mPos[m.key];if(!vis(m))return null;const isA=sM?.key===m.key;
              return <line key={`l${m.key}`} x1={CX} y1={CY} x2={o.x} y2={o.y} stroke={C.gold} strokeWidth={isA?5:3} opacity={isA?0.5:0.2}/>;
            })}
            {/* Lines main→subs */}
            {sM?.key==="proyectos"&&pN.map((p,i)=>{const o=mPos.proyectos;if(sProj&&sProj.key!==p.key)return null;
              return <line key={`lp${i}`} x1={o.x} y1={o.y} x2={p.x} y2={p.y} stroke={C.gold} strokeWidth={sProj?.key===p.key?3:2} opacity={sProj?.key===p.key?0.5:0.25}/>;
            })}
            {allS.map((s,i)=>{const mk=sM?.key;const o=mPos[mk];if(!o)return null;if(sSub&&sSub.key!==s.key)return null;
              return <line key={`ls${i}`} x1={o.x} y1={o.y} x2={s.x} y2={s.y} stroke={s.color} strokeWidth={sSub?.key===s.key?3:1.8} opacity={sSub?.key===s.key?0.5:0.25}/>;
            })}
            {/* Lines sub→items */}
            {sItems.map((it,i)=>(<line key={`li${i}`} x1={sSub.x} y1={sSub.y} x2={it.x} y2={it.y} stroke={sSub.color} strokeWidth={2} opacity={0.25}/>))}
            {/* Lines proj→temas */}
            {sProj&&tN.map((t,i)=>{const pp=pN.find(p=>p.key===sProj.key);if(!pp)return null;if(sTema&&sTema.name!==t.name)return null;
              return <line key={`lt${i}`} x1={pp.x} y1={pp.y} x2={t.x} y2={t.y} stroke={C.gold} strokeWidth={sTema?.name===t.name?3:2} opacity={sTema?.name===t.name?0.5:0.25}/>;
            })}

            {/* ITEMS (micro nodos) */}
            {sItems.map((it,i)=>{const isH=hov===`it${i}`;const noC=!hasContact(it.name);const matchesSearch=searchTag&&getTags(it.name).includes(searchTag);
              return(<g key={`it${i}`} onClick={e=>{e.stopPropagation();dr.current.m=false;try{if(it&&it.x!=null&&it.y!=null){openItem({...it,_parentKey:sSub?.key||null,_isCustom:!!(!sSub?.isCustom?((cNietos[sSub?.key]||[]).some(n=>n.name===it.name)):true)});flyTo(camN(it.x,it.y),700);}}catch(er){console.error(er);}}}
                onMouseEnter={()=>setHov(`it${i}`)} onMouseLeave={()=>setHov(null)} style={{cursor:"pointer"}}>
                {noC&&<circle cx={it.x} cy={it.y} r={36} fill={C.pulseRed} opacity={0.5}
                  style={{animation:"redPulse 2s ease-in-out infinite",transformOrigin:`${it.x}px ${it.y}px`}}/>}
                <circle cx={it.x} cy={it.y} r={isH?NR3+6:NR3} fill={isH?sSub.color:(matchesSearch?C.gold+"20":C.white)} stroke={matchesSearch?C.gold:sSub.color} strokeWidth={isH?3:2} opacity={0.9}
                  style={{filter:isH?`drop-shadow(0 2px 10px ${sSub.color}40)`:"none"}}/>
                <text x={it.x} y={it.y+NR3+20} textAnchor="middle" fontSize={12} fontWeight={800} fill={isH?sSub.color:C.textDk}
                  fontFamily="'Source Sans 3',sans-serif" style={{pointerEvents:"none"}}>{it.name.length>38?it.name.substring(0,37)+"…":it.name}</text>
                {it.contact&&<text x={it.x} y={it.y+NR3+34} textAnchor="middle" fontSize={9} fontWeight={700} fill={C.textLt}
                  style={{pointerEvents:"none"}}>👤 {it.contact}</text>}
                {/* Tag chips */}
                {getTags(it.name).slice(0,2).map((tg,ti)=>(
                  <text key={`tg${ti}`} x={it.x} y={it.y+NR3+(it.contact?50:38)+ti*14} textAnchor="middle"
                    fontSize={7.5} fontWeight={600} fill={searchTag===tg?C.gold:C.textLt+"90"}
                    fontFamily="'Source Sans 3',sans-serif" style={{pointerEvents:"none"}}>
                    {"● "+tg}
                  </text>
                ))}
              </g>);})}

            {/* TEMÁTICAS */}
            {tN.map((t,i)=>{if(sTema&&sTema.name!==t.name)return null;const isA=sTema?.name===t.name;
              return(<g key={`t${i}`} onClick={e=>{e.stopPropagation();dr.current.m=false;goTema(t);}} style={{cursor:"pointer"}}>
                {isA&&<circle cx={t.x} cy={t.y} r={NR2+18} fill={C.gold} opacity={0.08}/>}
                <circle cx={t.x} cy={t.y} r={NR2} fill={isA?C.gold:C.white} stroke={C.gold} strokeWidth={isA?4:2.5}
                  style={{filter:isA?`drop-shadow(0 3px 14px ${C.gold}30)`:"drop-shadow(0 1px 5px rgba(0,0,0,0.06))"}}/>
                <MT text={t.name} x={t.x} y={t.y} size={14} fill={isA?C.white:C.textDk} lh={17}/></g>);})}

            {/* SUBS */}
            {allS.map((s,i)=>{if(sSub&&sSub.key!==s.key)return null;const isA=sSub?.key===s.key;
              return(<g key={`s${i}`} onClick={e=>{e.stopPropagation();dr.current.m=false;goSub(s);}} style={{cursor:"pointer"}}>
                {isA&&<circle cx={s.x} cy={s.y} r={NR2+16} fill={s.color} opacity={0.08}/>}
                <circle cx={s.x} cy={s.y} r={NR2} fill={isA?s.color:C.white} stroke={s.color} strokeWidth={isA?4:2.5}
                  style={{filter:isA?`drop-shadow(0 3px 14px ${s.color}30)`:"drop-shadow(0 1px 5px rgba(0,0,0,0.06))"}}/>
                <MT text={s.name} x={s.x} y={s.y} size={14} fill={isA?C.white:s.color} lh={17}/></g>);})}

            {/* PROJECTS */}
            {pN.map((p,i)=>{if(sProj&&sProj.key!==p.key)return null;const isA=sProj?.key===p.key;
              return(<g key={`p${i}`} onClick={e=>{e.stopPropagation();dr.current.m=false;goProj(p);}} style={{cursor:"pointer"}}>
                {isA&&<circle cx={p.x} cy={p.y} r={NR2+18} fill="none" stroke={C.gold} strokeWidth={1.5} strokeDasharray="6,5" opacity={0.35}>
                  <animateTransform attributeName="transform" type="rotate" from={`0 ${p.x} ${p.y}`} to={`360 ${p.x} ${p.y}`} dur="18s" repeatCount="indefinite"/></circle>}
                <circle cx={p.x} cy={p.y} r={NR2} fill={isA?C.gold:C.white} stroke={C.gold} strokeWidth={isA?4:2.5}
                  style={{filter:isA?`drop-shadow(0 4px 18px ${C.gold}50)`:"drop-shadow(0 2px 8px rgba(0,0,0,0.07))"}}/>
                <MT text={p.name} x={p.x} y={p.y} size={13} fill={isA?C.white:C.textDk} lh={16}/>
                {/* Project tag chips (max 2, below node) */}
                {!isA&&getTags(p.short).slice(0,2).map((tg,ti)=>(
                  <text key={`pt${ti}`} x={p.x} y={p.y+NR2+14+ti*13} textAnchor="middle"
                    fontSize={8} fontWeight={600} fill={C.textLt+"90"}
                    fontFamily="'Source Sans 3',sans-serif" style={{pointerEvents:"none"}}>
                    {"● "+tg}</text>
                ))}
              </g>);})}

            {/* MAIN NODES */}
            {MAIN.map(m=>{if(!vis(m))return null;const o=mPos[m.key];const isA=sM?.key===m.key;
              return(<g key={`m${m.key}`} onClick={e=>{e.stopPropagation();dr.current.m=false;goMain(m);}} style={{cursor:"pointer"}}>
                {/* Outer glow ring */}
                <circle cx={o.x} cy={o.y} r={NR1+24} fill={m.color} opacity={isA?0.08:0.04}/>
                {isA&&<circle cx={o.x} cy={o.y} r={NR1+30} fill="none" stroke={m.color} strokeWidth={2.5} strokeDasharray="8,6" opacity={0.3}>
                  <animateTransform attributeName="transform" type="rotate" from={`0 ${o.x} ${o.y}`} to={`360 ${o.x} ${o.y}`} dur="20s" repeatCount="indefinite"/></circle>}
                {/* Main circle — always filled */}
                <circle cx={o.x} cy={o.y} r={NR1} fill={m.color} stroke={isA?C.goldDk:m.color+"90"} strokeWidth={isA?6:3}
                  style={{filter:`drop-shadow(0 6px 28px ${m.color}${isA?"70":"35"})`}}/>
                {/* Inner ring accent */}
                <circle cx={o.x} cy={o.y} r={NR1-12} fill="none" stroke={C.white+"20"} strokeWidth={1.2}/>
                {/* Text — large, bold, white for contrast */}
                <MT text={m.name} x={o.x} y={o.y} size={28} fill={C.white} lh={33}/></g>);})}

            {/* CENTRAL */}
            <g onClick={e=>{e.stopPropagation();dr.current.m=false;sM?goHome():setCPanel(p=>!p);}} style={{cursor:"pointer"}}>
              <circle cx={CX} cy={CY} r={NR0} fill={C.gold} stroke={C.goldDk} strokeWidth={5} style={{filter:`drop-shadow(0 4px 24px ${C.gold}50)`}}/>
              <circle cx={CX} cy={CY} r={NR0-14} fill="none" stroke={C.white+"25"} strokeWidth={1}/>
              <image href={LOGO} x={CX-100} y={CY-100} width={200} height={200} preserveAspectRatio="xMidYMid meet" style={{pointerEvents:"none"}}/></g>

            {!sM&&!cPanel&&<text x={CX} y={CY+200} textAnchor="middle" fontSize={18} fill={C.textLt+"80"} fontFamily="'Source Sans 3',sans-serif">Clic en un nodo · Scroll = zoom · Arrastra = mover</text>}
          </svg>
        </div>

        {panel&&sProj&&<PanelC data={sProj.desc} accent={sProj.color} onClose={()=>setPanel(false)} isCentral={false}/>}
        {/* GENERIC LIST PANEL — for any listMode sub */}
        {panel&&sSub?.listMode&&(
          <div style={{position:"absolute",top:0,right:0,width:450,height:"100%",zIndex:30,
            background:C.panelBg,borderLeft:`2px solid ${sSub.color}40`,boxShadow:"-6px 0 36px rgba(0,0,0,0.08)",
            display:"flex",flexDirection:"column",animation:"slI 0.45s cubic-bezier(0.22,1,0.36,1)"}}>
            <div style={{padding:"22px 24px 16px",borderBottom:`1px solid ${C.gold}25`,flexShrink:0,
              display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{flex:1,paddingRight:12}}>
                <div style={{fontSize:10,color:sSub.color,fontWeight:700,textTransform:"uppercase",
                  letterSpacing:"1.5px",marginBottom:6}}>{sM?.name?.split("\n")[0]||""}</div>
                <div style={{fontSize:22,fontWeight:900,color:C.textDk,lineHeight:1.3,
                  fontFamily:"'Cormorant Garamond',serif"}}>{sSub.name.split("\n").join(" ")}</div>
                <div style={{fontSize:12,color:C.textLt,marginTop:4}}>{sSub.items.length} elementos</div>
              </div>
              <div style={{display:"flex",gap:6,flexShrink:0}}>
                <button onClick={e=>{e.stopPropagation();if(sSub){openItem({name:(sSub.name||'').replace(/\n/g,' '),_level:'hijo',_mainKey:sM?.key||null});}}}
                  style={{background:"transparent",border:`1px solid ${C.gold}40`,color:C.gold,
                    borderRadius:8,width:32,height:32,fontSize:13,cursor:"pointer",
                    display:"flex",alignItems:"center",justifyContent:"center"}}>ⓘ</button>
                <button onClick={()=>{setPanel(false);setSSub(null);if(sM)goMain(sM);}}
                  style={{background:"transparent",border:`1px solid ${C.gold}40`,color:C.textLt,
                    borderRadius:8,width:32,height:32,fontSize:15,cursor:"pointer",
                    display:"flex",alignItems:"center",justifyContent:"center"}}> ✕</button>
              </div>
            </div>
            <div style={{flex:1,overflowY:"auto",padding:"8px 0"}}>
              {[...(sSub.items||[]),...((!sSub.isCustom&&cNietos[sSub.key])?cNietos[sSub.key].map(n=>n.name):[])].filter(it=>!deletedNodes.includes(typeof it==='string'?it:it)).sort((a,b)=>String(a).localeCompare(String(b),'es')).map((item,i)=>{
                const itemName=typeof item==="string"?item:item.name;
                const contact=gc(itemName)||(Array.isArray(contacts[itemName])&&contacts[itemName].length>0?contacts[itemName].map(c=>c.name).join(', '):null);
                const tags=(typeof getAllTags==='function')?getAllTags(itemName):getTags(itemName);
                return(
                  <div key={i} onClick={()=>{openItem({name:itemName,contact:contact,_parentKey:sSub?.key||null,_isCustom:!!((cNietos[sSub?.key]||[]).some(n=>n.name===itemName))});}}
                    style={{padding:"14px 24px",cursor:"pointer",borderBottom:`1px solid ${C.gold}08`,
                      transition:"background 0.15s"}}
                    onMouseEnter={e=>e.currentTarget.style.background=C.gold+"08"}
                    onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                    <div style={{display:"flex",alignItems:"center",gap:10}}>
                      {/* Contact indicator */}
                      <div style={{width:10,height:10,borderRadius:"50%",flexShrink:0,
                        background:(contact||hasContact(itemName))?C.green:C.pulseRed}}/>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:15,fontWeight:800,color:C.textDk,lineHeight:1.4,
                          fontFamily:"'Cormorant Garamond',serif"}}>{itemName}</div>
                        {contact&&(
                          <div style={{fontSize:12,color:C.gold,fontWeight:600,marginTop:3}}>
                            👤 {contact}</div>
                        )}
                        {tags.length>0&&(
                          <div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:5}}>
                            {tags.slice(0,3).map((tg,ti)=>(
                              <span key={ti} style={{fontSize:9,fontWeight:700,color:C.gold,
                                background:C.gold+"12",border:`1px solid ${C.gold}20`,
                                borderRadius:10,padding:"1px 8px"}}>{tg}</span>
                            ))}
                          </div>
                        )}
                      </div>
                      <span style={{fontSize:16,color:C.gold,flexShrink:0}}>›</span>

                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{height:3,background:`linear-gradient(90deg,${sSub.color},${C.gold})`,flexShrink:0}}/>
          </div>
        )}

        {cPanel&&!sM&&<PanelC data={CENTRAL} accent={C.gold} onClose={()=>setCPanel(false)} isCentral={true}/>}
      </div>

      {/* TOOLTIP */}
      {hov&&hov.startsWith("it")&&!sItem&&(()=>{const idx=parseInt(hov.slice(2));const it=sItems[idx];if(!it)return null;
        return(<div style={{position:"fixed",left:ms.x+16,top:ms.y-14,pointerEvents:"none",background:C.white,border:`1px solid ${C.gold}30`,borderRadius:10,padding:"10px 16px",zIndex:80,maxWidth:360,boxShadow:"0 4px 20px rgba(0,0,0,0.08)"}}>
          <div style={{fontSize:14,color:C.textDk,fontWeight:800,fontFamily:"'Cormorant Garamond',serif"}}>{it.name}</div>
          {it.contact&&<div style={{fontSize:11,color:C.gold,fontWeight:600,marginTop:4}}>👤 {it.contact}</div>}
          {!it.contact&&<div style={{fontSize:10,color:C.pulseRed,fontWeight:600,marginTop:4}}>⚠ Pendiente</div>}
        </div>);})()}

      {sItem&&sItem.name&&<ItemPop item={sItem} onClose={()=>setSItem(null)} noteText={nt} setNoteText={setNt} onSave={()=>saveN(sItem.name,nt)} noteHistory={Array.isArray(notes[sItem.name])?notes[sItem.name]:[]} onDelete={(idx)=>delNote(sItem.name,idx)} onEdit={(idx,txt)=>editNote(sItem.name,idx,txt)} userContacts={Array.isArray(contacts[sItem?.name])?contacts[sItem.name]:[]} onAddContact={c=>addContact(sItem.name,c)} onEditContact={(idx,c)=>editContact(sItem.name,idx,c)} onDelContact={idx=>delContact(sItem.name,idx)}
        itemTags={getAllTags(sItem?.name||'')} onAddTag={addUserTag} onRmTag={rmUserTag}
        onDeleteNode={(sItem?._parentKey||sItem?._level==='hijo'||sItem?._mainKey)?()=>{
          try{
            const nm=sItem.name;
            if(sItem._isCustom&&sItem._parentKey){
              delNieto(sItem._parentKey,nm);
            } else if(sItem._level==='hijo'&&sItem._mainKey){
              /* Delete a hijo (sub): add to deletedNodes + remove custom hijo if applicable */
              deleteBuiltIn(nm);
              try{const ch2={...cHijos};if(ch2[sItem._mainKey]){ch2[sItem._mainKey]=ch2[sItem._mainKey].filter(h=>(h.name||'').replace(/\n/g,' ')!==nm);saveCH(ch2);}}catch(e2){}
              setSSub(null);setPanel(false);
            } else {
              deleteBuiltIn(nm);
            }
            /* Clean tags */
            try{const ut2={...userTags};delete ut2[nm];saveUT(ut2);}catch(e3){}
            setSItem(null);
          }catch(e){console.error(e);}
        }:null}/>}

      <div style={{position:"absolute",bottom:8,left:"50%",transform:"translateX(-50%)",fontSize:10,color:C.textLt+"60",zIndex:10,pointerEvents:"none",textAlign:"center"}}>
        {sM&&!sProj&&!sSub&&"Selecciona una subcategoría · Menú izquierdo: navegación"}
        {(sProj||sSub)&&"Clic en un elemento para ver detalle y notas"}</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Dashboard));
</script></body></html>
